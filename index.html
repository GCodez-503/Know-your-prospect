<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Know Your Prospect — Copado</title>
<style>
:root{
  --bg:#080811;--surf:#10101c;--surf2:#18182e;--surf3:#1e1e38;--bord:#22223a;--bord2:#2e2e50;
  --coral:#ff5533;--violet:#7c3aed;--violet2:#a78bfa;--emerald:#10b981;--amber:#f59e0b;--danger:#ef4444;--indigo:#818cf8;
  --t1:#eeeef8;--t2:#8888b0;--t3:#56567e;--t4:#28283e;
  --radius:12px;--radius-lg:16px;
  --grad-v:linear-gradient(135deg,#7c3aed,#a78bfa);
  --grad-coral:linear-gradient(135deg,#ff5533,#ff8866);
  --shadow:0 8px 32px rgba(0,0,0,.45),0 2px 8px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;line-height:1.5}
.wrap{max-width:920px;margin:0 auto;padding:0 16px 80px}
/* header */
.hdr{position:sticky;top:0;z-index:50;background:rgba(8,8,17,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--bord);display:flex;align-items:center;gap:12px;padding:12px 16px}
.hdr .logo{font-size:18px;font-weight:800;letter-spacing:-.02em}
.hdr .logo b{background:var(--grad-v);-webkit-background-clip:text;background-clip:text;color:transparent}
.hdr .spacer{flex:1}
.btn{border:1px solid var(--bord2);background:var(--surf2);color:var(--t1);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.btn:hover{border-color:var(--violet);transform:translateY(-1px)}
.btn.primary{background:var(--grad-v);border:none}
.btn.coral{background:var(--grad-coral);border:none}
.btn.ghost{background:transparent}
.btn.sm{padding:5px 10px;font-size:12px}
/* nav tabs */
.nav{display:flex;gap:6px;flex-wrap:wrap;padding:16px 0 8px}
.nav button{flex:1;min-width:120px;border:1px solid var(--bord);background:var(--surf);color:var(--t2);border-radius:12px;padding:12px 10px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:4px}
.nav button .ic{font-size:22px}
.nav button:hover{border-color:var(--bord2);color:var(--t1)}
.nav button.active{border-color:var(--violet);color:var(--t1);background:var(--surf2);box-shadow:0 0 0 1px var(--violet) inset}
.view{display:none}
.view.active{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
/* cards */
.card{background:var(--surf);border:1px solid var(--bord);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow)}
.hero{padding:26px 22px;margin-top:8px;background:linear-gradient(135deg,#13103a,#10101c)}
.hero h1{font-size:24px;font-weight:800;letter-spacing:-.02em}
.hero p{color:var(--t2);margin-top:8px;max-width:620px}
.stat-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.stat{background:var(--surf2);border:1px solid var(--bord);border-radius:12px;padding:12px 16px;min-width:110px}
.stat .n{font-size:24px;font-weight:900}
.stat .l{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.section-title{font-size:13px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.08em;margin:24px 0 10px}
/* persona grid */
.alt-group{margin-bottom:18px}
.alt-label{font-size:12px;font-weight:800;color:var(--violet2);text-transform:uppercase;letter-spacing:.08em;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.alt-label .desc{color:var(--t3);font-weight:500;text-transform:none;letter-spacing:0;font-size:11px}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.pcard{background:var(--surf);border:1px solid var(--bord);border-radius:12px;padding:14px;cursor:pointer;transition:.15s;display:flex;gap:12px;align-items:flex-start}
.pcard:hover{border-color:var(--violet);transform:translateY(-2px)}
.pcard .ic{font-size:26px;flex-shrink:0}
.pcard .nm{font-size:14px;font-weight:800}
.pcard .ol{font-size:11px;color:var(--t2);margin-top:3px;line-height:1.4}
.pcard.custom .nm:after{content:'★';color:var(--amber);margin-left:6px;font-size:11px}
/* dossier */
.dim{border-top:1px solid var(--bord);padding:16px 0}
.dim:first-of-type{border-top:none}
.dim h3{font-size:14px;font-weight:800;color:var(--violet2);display:flex;align-items:center;gap:8px}
.dim .summary{margin:6px 0 8px;color:var(--t1)}
.dim ul{margin:0;padding-left:20px;color:var(--t2)}
.dim ul li{margin:4px 0}
.dim ol{margin:0;padding-left:22px;color:var(--t1)}
.dim ol li{margin:6px 0}
.objlist{list-style:none;padding:0}
.objlist li{background:var(--surf2);border:1px solid var(--bord);border-radius:10px;padding:10px 12px;margin:8px 0}
.objlist .o{font-weight:700;color:var(--coral)}
.objlist .r{color:var(--t2);margin-top:4px;font-size:13px}
.quote{font-style:italic;color:var(--t1);border-left:3px solid var(--violet);padding:8px 0 8px 14px;margin-top:6px}
/* quiz shared */
.quiz-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;background:var(--surf2);border:1px solid var(--bord);color:var(--t2)}
.pill.dim{color:var(--violet2);border-color:var(--bord2)}
.progress{height:6px;background:var(--surf2);border-radius:99px;overflow:hidden;margin:10px 0 4px}
.progress>div{height:100%;background:var(--grad-v);transition:.3s}
.q-prompt{font-size:18px;font-weight:700;margin:10px 0 16px;line-height:1.45}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{text-align:left;border:1px solid var(--bord);background:var(--surf2);color:var(--t1);border-radius:12px;padding:13px 15px;font-size:14px;cursor:pointer;transition:.12s}
.choice:hover{border-color:var(--violet)}
.choice.correct{border-color:var(--emerald);background:rgba(16,185,129,.12)}
.choice.wrong{border-color:var(--danger);background:rgba(239,68,68,.1)}
.choice:disabled{cursor:default}
.feedback{margin-top:14px;padding:13px 15px;border-radius:12px;font-size:14px;line-height:1.5}
.feedback.good{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3)}
.feedback.bad{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25)}
.feedback.adv{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3)}
.feedback.stall{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3)}
.feedback.kill{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3)}
.feedback b{display:block;margin-bottom:3px}
.conf{display:flex;gap:8px;margin:4px 0 14px}
.conf button{flex:1;border:1px solid var(--bord);background:var(--surf2);color:var(--t2);border-radius:10px;padding:9px;font-size:12px;font-weight:700;cursor:pointer}
.conf button.sel{border-color:var(--violet);color:var(--t1)}
.conf-note{font-size:12px;color:var(--t3);margin-bottom:6px}
/* flashcard */
.flash{perspective:1200px;margin:10px 0}
.flash-inner{position:relative;min-height:220px;border-radius:var(--radius-lg);transition:transform .5s;transform-style:preserve-3d;cursor:pointer}
.flash.flipped .flash-inner{transform:rotateY(180deg)}
.flash-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius-lg);padding:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;border:1px solid var(--bord)}
.flash-front{background:var(--surf)}
.flash-back{background:linear-gradient(135deg,#13103a,#10101c);transform:rotateY(180deg)}
.flash-face .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:12px}
.flash-face .txt{font-size:18px;font-weight:600;line-height:1.5}
.flash-hint{text-align:center;color:var(--t3);font-size:12px;margin-top:8px}
.srs-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
.srs-btns button{border-radius:10px;padding:11px 6px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--bord);background:var(--surf2);color:var(--t1)}
.srs-btns button small{display:block;font-size:10px;color:var(--t3);font-weight:500;margin-top:2px}
.srs-again{border-color:var(--danger)!important}
.srs-hard{border-color:var(--amber)!important}
.srs-good{border-color:var(--violet)!important}
.srs-easy{border-color:var(--emerald)!important}
/* end screen */
.end{text-align:center;padding:30px 16px}
.end .big{font-size:54px;font-weight:900;line-height:1}
.end .sub{color:var(--t2);margin-top:8px}
.dimbars{margin:20px 0;text-align:left}
.dimbar{margin:8px 0}
.dimbar .top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.dimbar .top .pct{color:var(--t2)}
/* selectors */
.selrow{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
select,input,textarea{font-family:inherit;background:var(--surf2);border:1px solid var(--bord);color:var(--t1);border-radius:10px;padding:9px 12px;font-size:13px}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--violet)}
label.fld{font-size:12px;color:var(--t2);font-weight:600;display:block;margin:10px 0 4px}
textarea{width:100%;min-height:340px;resize:vertical;line-height:1.5;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px}
.muted{color:var(--t3);font-size:12px}
.center{text-align:center}
.row{display:flex;gap:10px;flex-wrap:wrap}
.grow{flex:1}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surf3);border:1px solid var(--violet);color:var(--t1);padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:var(--shadow);z-index:200;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
.hidden{display:none!important}
.empty{text-align:center;color:var(--t3);padding:40px 16px}
code.k{background:var(--surf2);border:1px solid var(--bord);border-radius:6px;padding:1px 6px;font-size:12px;color:var(--violet2)}
.badge{font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;text-transform:uppercase;letter-spacing:.05em}
.badge.adv{background:rgba(16,185,129,.15);color:#34d399}
.badge.stall{background:rgba(245,158,11,.15);color:#fbbf24}
.badge.kill{background:rgba(239,68,68,.15);color:#f87171}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">Know Your <b>Prospect</b></div>
  <div class="spacer"></div>
  <button class="btn sm ghost" onclick="resetProgress()">Reset progress</button>
  <button class="btn sm" onclick="go('add')">+ Add persona</button>
</div>
<div class="wrap">
  <div class="nav">
    <button data-v="home" class="active" onclick="go('home')"><span class="ic">🏠</span>Home</button>
    <button data-v="browse" onclick="go('browse')"><span class="ic">📇</span>Personas</button>
    <button data-v="flash" onclick="go('flash')"><span class="ic">🃏</span>Flashcards</button>
    <button data-v="mcq" onclick="go('mcq')"><span class="ic">✅</span>Quiz</button>
    <button data-v="scenario" onclick="go('scenario')"><span class="ic">🎭</span>Scenarios</button>
    <button data-v="guess" onclick="go('guess')"><span class="ic">🕵️</span>Guess Who</button>
    <button data-v="volley" onclick="go('volley')"><span class="ic">🛡️</span>Objections</button>
  </div>

  <!-- HOME -->
  <div id="view-home" class="view active"></div>
  <!-- BROWSE -->
  <div id="view-browse" class="view"></div>
  <!-- FLASH -->
  <div id="view-flash" class="view"></div>
  <!-- MCQ -->
  <div id="view-mcq" class="view"></div>
  <!-- SCENARIO -->
  <div id="view-scenario" class="view"></div>
  <!-- GUESS -->
  <div id="view-guess" class="view"></div>
  <!-- VOLLEY -->
  <div id="view-volley" class="view"></div>
  <!-- ADD -->
  <div id="view-add" class="view"></div>
</div>
<div class="toast" id="toast"></div>

const ALT_ORDER = ["doer","manager","technical-authority","exec"];
const ALT_LABEL = {"doer":"Doers","manager":"Managers","technical-authority":"Technical Authorities","exec":"Executives"};
const DIMS = SEED.meta.dimensions;
const DIM_LABEL = {}; DIMS.forEach(d=>DIM_LABEL[d.id]=d.label);
const LS = {custom:"kyp_custom_v1", srs:"kyp_srs_v1", stats:"kyp_stats_v1"};

function load(k,def){try{return JSON.parse(localStorage.getItem(k))||def}catch(e){return def}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function getPersonas(){
  const custom = load(LS.custom,[]);
  const map={}; SEED.personas.forEach(p=>map[p.id]=p);
  custom.forEach(p=>map[p.id]=Object.assign({},p,{_custom:true}));
  return Object.values(map);
}
function pById(id){return getPersonas().find(p=>p.id===id)}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}

/* ============ NAV ============ */
function go(v){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.v===v));
  window.scrollTo(0,0);
  ({home:renderHome,browse:renderBrowse,flash:initFlash,mcq:initMcq,scenario:initScenario,guess:initGuess,volley:initVolley,add:renderAdd}[v]||(()=>{}))();
}

/* ============ STATS (per-dimension) ============ */
function recordStat(dim,correct){
  if(!dim)return;
  const s=load(LS.stats,{});
  s[dim]=s[dim]||{c:0,t:0};
  s[dim].t++; if(correct)s[dim].c++;
  save(LS.stats,s);
}
function dimScorecard(){
  const s=load(LS.stats,{});
  return DIMS.map(d=>{
    const e=s[d.id]||{c:0,t:0};
    return {id:d.id,label:d.label,c:e.c,t:e.t,pct:e.t?Math.round(100*e.c/e.t):null};
  });
}

function modeCard(v,ic,nm,ol){return `<div class="pcard" onclick="go('${v}')"><div class="ic">${ic}</div><div><div class="nm">${nm}</div><div class="ol">${ol}</div></div></div>`}
function dimBar(d){
  const pct=d.pct===null?0:d.pct;
  const color=d.pct===null?'var(--t4)':d.pct>=75?'var(--emerald)':d.pct>=50?'var(--amber)':'var(--danger)';
  return `<div class="dimbar"><div class="top"><span>${d.label}</span><span class="pct">${d.pct===null?'—':d.pct+'% ('+d.c+'/'+d.t+')'}</span></div><div class="progress"><div style="width:${pct}%;background:${color}"></div></div></div>`;
}

/* ============ PERSONA SELECTOR ============ */
function personaOptions(sel){
  const ps=getPersonas();
  let h='<option value="__all__">All personas</option>';
  ALT_ORDER.forEach(a=>{
    const grp=ps.filter(p=>p.altitude===a);
    if(!grp.length)return;
    h+=`<optgroup label="${ALT_LABEL[a]}">`+grp.map(p=>`<option value="${p.id}" ${sel===p.id?'selected':''}>${p.icon} ${p.role}</option>`).join('')+'</optgroup>';
  });
  return h;
}

/* ============ BROWSE ============ */

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

/* ============ FLASHCARDS + SPACED REPETITION ============ */
function allCards(){const out=[];getPersonas().forEach(p=>(p.quiz.flashcards||[]).forEach((c,i)=>out.push(Object.assign({},c,{pid:p.id,role:p.role,icon:p.icon,cid:p.id+':'+i}))));return out}
function srsState(){return load(LS.srs,{})}
function dueCount(){const st=srsState();const now=Date.now();return allCards().filter(c=>{const e=st[c.cid];return !e||e.due<=now}).length}
let flashQueue=[],flashIdx=0,flashFilter='__all__';
function initFlash(){
  const el=document.getElementById('view-flash');
  el.innerHTML=`
    <div class="quiz-head" style="margin-top:16px">
      <div><div class="section-title" style="margin:0">Flashcards · spaced repetition</div><div class="muted">Due cards resurface first. Rate honestly — it tunes the schedule.</div></div>
      <select id="flashSel" onchange="flashFilter=this.value;buildFlashQueue()">${personaOptions(flashFilter)}</select>
    </div>
    <div id="flashBody"></div>`;
  buildFlashQueue();
}
function buildFlashQueue(){
  const st=srsState();const now=Date.now();
  let cards=allCards();
  if(flashFilter!=='__all__')cards=cards.filter(c=>c.pid===flashFilter);
  // due first, then new, then soonest
  cards.sort((a,b)=>{const ea=st[a.cid],eb=st[b.cid];const da=ea?ea.due:0,db=eb?eb.due:0;return da-db});
  flashQueue=cards;flashIdx=0;
  renderFlash();
}
function renderFlash(){
  const body=document.getElementById('flashBody');
  if(!flashQueue.length){body.innerHTML='<div class="card empty">No cards for this selection.</div>';return}
  if(flashIdx>=flashQueue.length){
    body.innerHTML=`<div class="card end"><div class="big">✓</div><div class="sub">Session complete — ${flashQueue.length} cards reviewed.</div><button class="btn primary" style="margin-top:16px" onclick="buildFlashQueue()">Go again</button></div>`;
    return;
  }
  const c=flashQueue[flashIdx];const st=srsState();const e=st[c.cid];
  const status=!e?'NEW':(e.due<=Date.now()?'DUE':'REVIEW');
  body.innerHTML=`
    <div class="quiz-head"><span class="pill">${c.icon} ${c.role}</span><span class="pill dim">${DIM_LABEL[c.dim]||c.dim}</span><span class="pill">${status}</span></div>
    <div class="progress"><div style="width:${100*flashIdx/flashQueue.length}%"></div></div>
    <div class="flash" id="flashCard" onclick="this.classList.toggle('flipped')">
      <div class="flash-inner">
        <div class="flash-face flash-front"><div class="lbl">Prompt</div><div class="txt">${esc(c.front)}</div></div>
        <div class="flash-face flash-back"><div class="lbl">Answer</div><div class="txt">${esc(c.back)}</div></div>
      </div>
    </div>
    <div class="flash-hint">tap card to flip</div>
    <div class="srs-btns">
      <button class="srs-again" onclick="rateCard(0)">Again<small>&lt;1m</small></button>
      <button class="srs-hard" onclick="rateCard(1)">Hard<small>soon</small></button>
      <button class="srs-good" onclick="rateCard(2)">Good<small>+days</small></button>
      <button class="srs-easy" onclick="rateCard(3)">Easy<small>+weeks</small></button>
    </div>
    <div class="muted center" style="margin-top:8px">Card ${flashIdx+1} of ${flashQueue.length}</div>`;
}
function rateCard(q){ // SM-2 lite
  const c=flashQueue[flashIdx];const st=srsState();
  let e=st[c.cid]||{ef:2.5,reps:0,interval:0};
  if(q===0){e.reps=0;e.interval=0;}
  else{
    e.ef=Math.max(1.3,e.ef+(0.1-(3-q)*(0.08+(3-q)*0.02)));
    e.reps++;
    if(e.reps===1)e.interval=q===1?0.007:1; // hard ~10min else 1 day
    else if(e.reps===2)e.interval=q===1?1:6;
    else e.interval=Math.round(e.interval*e.ef);
  }
  e.due=Date.now()+e.interval*86400000;
  st[c.cid]=e;save(LS.srs,st);
  recordStat(c.dim,q>=2);
  flashIdx++;renderFlash();
}

let mcqQ=[],mcqIdx=0,mcqScore=0,mcqConf=null,mcqFilter='__all__';
function allMcq(){const out=[];getPersonas().forEach(p=>(p.quiz.mcq||[]).forEach(m=>out.push(Object.assign({},m,{pid:p.id,role:p.role,icon:p.icon}))));return out}
function initMcq(){

function startMcq(){

function renderMcq(){

  if(!mcqQ.length){body.innerHTML='<div class="card empty">No quiz questions for this selection.</div>';return}
  if(mcqIdx>=mcqQ.length){return endQuiz(body,mcqScore,mcqQ.length,startMcq)}
  mcqConf=null;
  const q=mcqQ[mcqIdx];
  body.innerHTML=`
    <div class="quiz-head"><span class="pill">${q.icon} ${q.role}</span><span class="pill dim">${DIM_LABEL[q.dim]||q.dim}</span></div>

    <div class="muted center" style="margin-top:12px">Question ${mcqIdx+1} of ${mcqQ.length} · Score ${mcqScore}</div>`;

function answerMcq(i){
  if(mcqConf===null){toast('Pick your confidence first 👆');return}
  const q=mcqQ[mcqIdx];const correct=i===q.answer;
  const btns=document.querySelectorAll('#mcqChoices .choice');
  btns.forEach((b,j)=>{b.disabled=true;if(j===q.answer)b.classList.add('correct');else if(j===i)b.classList.add('wrong')});
  let pts=0,msg='';
  if(correct){pts=mcqConf==='sure'?2:1;msg=mcqConf==='sure'?'Correct & confident — full marks.':'Correct — and good instinct to flag the doubt.';}
  else{pts=mcqConf==='sure'?-1:0;msg=mcqConf==='sure'?'Confidently wrong — that\'s the costly kind on a real call.':'Wrong, but you knew you were unsure. Lower stakes.';}
  mcqScore+=pts;
  recordStat(q.dim,correct);
  document.getElementById('mcqFb').innerHTML=`<div class="feedback ${correct?'good':'bad'}"><b>${msg} (${pts>=0?'+':''}${pts})</b>${esc(q.explain||'')}</div><button class="btn primary" style="margin-top:12px" onclick="mcqIdx++;renderMcq()">${mcqIdx+1>=mcqQ.length?'See results':'Next →'}</button>`;
}

/* ============ SCENARIOS ============ */
let scList=[],scActive=null,scStep=0,scScore=0,scMax=0;
function allScenarios(){const out=[];getPersonas().forEach(p=>(p.quiz.scenarios||[]).forEach((s,i)=>out.push(Object.assign({},s,{pid:p.id,role:p.role,icon:p.icon,sid:p.id+':'+i}))));return out}
function initScenario(){
  scList=allScenarios();
  const el=document.getElementById('view-scenario');
  el.innerHTML=`<div class="section-title" style="margin-top:16px">Scenario role-play</div><div class="muted" style="margin-bottom:12px">Pick a live-call scenario. Each choice advances, stalls, or kills the call.</div><div class="pgrid" id="scGrid">${scList.map(s=>`<div class="pcard" onclick="startScenario('${s.sid}')"><div class="ic">${s.icon}</div><div><div class="nm">${esc(s.title)}</div><div class="ol">${s.role}</div></div></div>`).join('')}</div><div id="scBody"></div>`;
}
function startScenario(sid){
  scActive=scList.find(s=>s.sid===sid);scStep=0;scScore=0;scMax=scActive.steps.length*3;
  document.getElementById('scGrid').classList.add('hidden');
  renderScenario();
}
function renderScenario(){
  const body=document.getElementById('scBody');const s=scActive;
  if(scStep>=s.steps.length){
    const pct=Math.round(100*scScore/scMax);
    const verdict=pct>=80?'You earned the meeting. 🎯':pct>=50?'Mixed — you kept it alive but left momentum on the table.':'That call got away from you. Run it again.';
    body.innerHTML=`<div class="card end"><div class="big">${pct}%</div><div class="sub">${verdict}</div><div class="row center" style="justify-content:center;margin-top:16px"><button class="btn" onclick="initScenario()">Pick another</button><button class="btn primary" onclick="startScenario('${s.sid}')">Replay</button></div></div>`;
    return;
  }
  const step=s.steps[scStep];
  body.innerHTML=`
    <div class="card" style="margin-top:14px">
      <div class="quiz-head"><span class="pill">${s.icon} ${s.role}</span><span class="pill">Step ${scStep+1}/${s.steps.length}</span></div>
      ${scStep===0?`<div class="feedback" style="background:var(--surf2);border:1px solid var(--bord)"><b>The setup</b>${esc(s.setup)}</div>`:''}
      <div class="q-prompt" style="font-size:16px">${esc(step.prompt)}</div>
      <div class="choices" id="scChoices">${step.choices.map((c,i)=>`<button class="choice" onclick="scPick(${i})">${esc(c.text)}</button>`).join('')}</div>
      <div id="scFb"></div>
    </div>`;
}
function scPick(i){
  const step=scActive.steps[scStep];const c=step.choices[i];
  const pts={advances:3,stall:1,stalls:1,kills:0,kill:0}[c.outcome]??1;
  scScore+=pts;
  document.querySelectorAll('#scChoices .choice').forEach(b=>b.disabled=true);
  const cls=c.outcome.startsWith('adv')?'adv':c.outcome.startsWith('kill')?'kill':'stall';
  const badge=cls==='adv'?'advances':cls==='kill'?'kills the call':'stalls';
  document.getElementById('scFb').innerHTML=`<div class="feedback ${cls}"><b><span class="badge ${cls}">${badge}</span></b>${esc(c.feedback)}</div><button class="btn primary" style="margin-top:12px" onclick="scStep++;renderScenario()">${scStep+1>=scActive.steps.length?'See result':'Continue →'}</button>`;
}

/* ============ GUESS WHO ============ */
let gwQ=[],gwIdx=0,gwScore=0;
function initGuess(){
  const ps=getPersonas().filter(p=>p.quiz.quote);
  gwQ=ps.map(p=>p.id);shuffle(gwQ);gwIdx=0;gwScore=0;
  const el=document.getElementById('view-guess');
  el.innerHTML=`<div class="section-title" style="margin-top:16px">Guess Who · reverse persona</div><div class="muted" style="margin-bottom:8px">A prospect says this. Who is it?</div><div id="gwBody"></div>`;
  renderGuess();
}
function renderGuess(){
  const body=document.getElementById('gwBody');
  if(gwIdx>=gwQ.length){return endQuiz(body,gwScore,gwQ.length,initGuess)}
  const ps=getPersonas();const ans=ps.find(p=>p.id===gwQ[gwIdx]);
  // build 4 options incl answer
  let pool=ps.filter(p=>p.id!==ans.id);shuffle(pool);
  let opts=[ans].concat(pool.slice(0,3));shuffle(opts);
  body.innerHTML=`
    <div class="progress"><div style="width:${100*gwIdx/gwQ.length}%"></div></div>
    <div class="card" style="margin:8px 0 14px"><div class="quote" style="font-size:18px;border-color:var(--coral)">${esc(ans.quiz.quote)}</div></div>
    <div class="choices" id="gwChoices">${opts.map(o=>`<button class="choice" onclick="answerGuess('${o.id}','${ans.id}')">${o.icon} ${o.role}</button>`).join('')}</div>
    <div id="gwFb"></div>
    <div class="muted center" style="margin-top:12px">${gwIdx+1} of ${gwQ.length} · Score ${gwScore}</div>`;
}
function answerGuess(pick,ans){
  const correct=pick===ans;if(correct)gwScore++;
  const ansP=pById(ans);
  document.querySelectorAll('#gwChoices .choice').forEach(b=>{b.disabled=true;if(b.textContent.trim().endsWith(ansP.role))b.classList.add('correct');else if(b.textContent.trim().endsWith(pById(pick).role)&&!correct)b.classList.add('wrong')});
  document.getElementById('gwFb').innerHTML=`<div class="feedback ${correct?'good':'bad'}"><b>${correct?'Right — '+ansP.role:'It was the '+ansP.role}</b>${esc(ansP.oneLiner)}</div><button class="btn primary" style="margin-top:12px" onclick="gwIdx++;renderGuess()">${gwIdx+1>=gwQ.length?'See results':'Next →'}</button>`;
}

/* ============ OBJECTION VOLLEY ============ */
let ovQ=[],ovIdx=0,ovRevealed=false,ovFilter='__all__',ovHit=0,ovSeen=0;
function allObjections(){const out=[];getPersonas().forEach(p=>(p.quiz.objections||[]).forEach(o=>out.push(Object.assign({},o,{pid:p.id,role:p.role,icon:p.icon}))));return out}
function initVolley(){
  const el=document.getElementById('view-volley');
  el.innerHTML=`
    <div class="quiz-head" style="margin-top:16px">
      <div><div class="section-title" style="margin:0">Objection volley</div><div class="muted">Objection fires. Say your response out loud, reveal, rate yourself.</div></div>
      <select id="ovSel" onchange="ovFilter=this.value;startVolley()">${personaOptions(ovFilter)}</select>
    </div>
    <div id="ovBody"></div>`;
  startVolley();
}
function startVolley(){
  let qs=allObjections();
  if(ovFilter!=='__all__')qs=qs.filter(q=>q.pid===ovFilter);
  shuffle(qs);ovQ=qs;ovIdx=0;ovHit=0;ovSeen=0;renderVolley();
}
function renderVolley(){
  const body=document.getElementById('ovBody');
  if(!ovQ.length){body.innerHTML='<div class="card empty">No objections for this selection.</div>';return}
  if(ovIdx>=ovQ.length){
    const pct=ovSeen?Math.round(100*ovHit/ovSeen):0;
    body.innerHTML=`<div class="card end"><div class="big">${pct}%</div><div class="sub">You felt solid on ${ovHit} of ${ovSeen} objections.</div><button class="btn primary" style="margin-top:16px" onclick="startVolley()">Go again</button></div>`;
    return;
  }
  ovRevealed=false;const o=ovQ[ovIdx];
  body.innerHTML=`
    <div class="quiz-head"><span class="pill">${o.icon} ${o.role}</span><span class="pill dim">${DIM_LABEL[o.dim]||o.dim}</span></div>
    <div class="progress"><div style="width:${100*ovIdx/ovQ.length}%"></div></div>
    <div class="card" style="margin:10px 0"><div class="muted">They throw at you:</div><div class="q-prompt" style="color:var(--coral);margin:8px 0 0">“${esc(o.objection)}”</div></div>
    <div id="ovReveal"><button class="btn primary" style="width:100%" onclick="revealVolley()">Reveal a strong response</button></div>
    <div class="muted center" style="margin-top:12px">${ovIdx+1} of ${ovQ.length}</div>`;
}
function revealVolley(){
  ovRevealed=true;const o=ovQ[ovIdx];
  document.getElementById('ovReveal').innerHTML=`
    <div class="feedback good"><b>One strong line:</b>${esc(o.response)}</div>
    <div class="muted center" style="margin:12px 0 6px">How close was your answer?</div>
    <div class="row" style="justify-content:center">
      <button class="btn" onclick="rateVolley(false)">Missed it</button>
      <button class="btn primary" onclick="rateVolley(true)">Nailed it</button>
    </div>`;
}
function rateVolley(hit){ovSeen++;if(hit)ovHit++;recordStat(ovQ[ovIdx].dim,hit);ovIdx++;renderVolley()}

/* ============ SHARED END SCREEN ============ */
function endQuiz(body,score,total,again){
  const sc=dimScorecard().filter(d=>d.t>0);
  body.innerHTML=`<div class="card end"><div class="big">${score}<span style="font-size:24px;color:var(--t3)"> pts</span></div><div class="sub">${total} questions · session complete</div>
    <div class="dimbars">${sc.map(d=>dimBar(d)).join('')||'<div class="muted center">Keep going to build your dimension scorecard.</div>'}</div>
    <button class="btn primary" onclick="(${again.name})()">Go again</button></div>`;
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function resetProgress(){if(confirm('Reset all spaced-repetition schedules and scores? Your custom personas stay.')){localStorage.removeItem(LS.srs);localStorage.removeItem(LS.stats);toast('Progress reset');go('home')}}

/* ============ ADD PERSONA (importer) ============ */
const TEMPLATE=`ROLE: New Persona Title
ALTITUDE: manager
ICON: 🎯
ONELINER: One sentence on who this prospect is and their core tension.

# CARES
summary: What they're measured on and lose sleep over.
- First thing they care about
- Second thing
- Third thing

# ROLEIMPACT
summary: How deployments/releases/quality hit THEIR job specifically.
- point
- point

# SALESFORCEREALITY
summary: What they actually do in Salesforce day-to-day.
- point
- point

# COPADOIMPACT
summary: The 'so what' of Copado for them, in their language.
- point
- point

# COMPETINGPRIORITIES
summary: What's louder than your call right now.
- point
- point

# MEETINGTRIGGER
summary: The one thing that turns a no into a yes.
- point
- point

# DISCOVERYQUESTIONS
summary: Questions that surface pain for this role.
- First discovery question?
- Second discovery question?
- Third discovery question?

# FLASHCARDS
Q: A front-of-card question | A: The answer | dim: cares
Q: Another question | A: Another answer | dim: copadoImpact

# MCQ
Q: A multiple choice question?
* The correct answer (marked with an asterisk)
- A wrong answer
- Another wrong answer
explain: Why the right answer is right.
dim: discoveryQuestions

# OBJECTIONS
O: Their objection | R: Your response
O: Another objection | R: Another response

# QUOTE
A first-person line this persona would actually say on a call.`;
function renderAdd(){
  const el=document.getElementById('view-add');
  const custom=load(LS.custom,[]);
  el.innerHTML=`
    <div class="section-title" style="margin-top:16px">Add a persona — one paste, done</div>
    <div class="card">
      <p class="muted">Fill in the template and paste it below. Hit <b>Add persona</b> and it's live in every mode instantly — flashcards, quiz, guess-who, objections. It's saved on this device. Use <b>Export</b> to send the full set back to get scenarios authored and baked in permanently.</p>
      <div class="row" style="margin:12px 0">
        <button class="btn" onclick="copyTemplate()">📋 Copy blank template</button>
        <button class="btn" onclick="loadTemplate()">↧ Load template into box</button>
        <button class="btn ghost" onclick="exportAll()">⬇ Export all personas (JSON)</button>
      </div>
      <label class="fld">Paste your filled-in persona here</label>
      <textarea id="addBox" placeholder="Paste the filled template..."></textarea>
      <div class="row" style="margin-top:12px">
        <button class="btn primary grow" onclick="doImport()">Add persona</button>
      </div>
      <div id="addMsg"></div>
    </div>
    ${custom.length?`<div class="section-title">Your custom personas (${custom.length})</div><div class="pgrid">${custom.map(p=>`<div class="pcard custom"><div class="ic">${p.icon||'🎯'}</div><div class="grow"><div class="nm">${esc(p.role)}</div><div class="ol">${esc(p.oneLiner||'')}</div></div><button class="btn sm ghost" onclick="delCustom('${p.id}')">✕</button></div>`).join('')}</div>`:''}`;
}
function copyTemplate(){navigator.clipboard.writeText(TEMPLATE).then(()=>toast('Template copied to clipboard')).catch(()=>{loadTemplate();toast('Loaded into the box instead')})}
function loadTemplate(){document.getElementById('addBox').value=TEMPLATE;toast('Template loaded — edit and Add')}
function delCustom(id){if(!confirm('Remove this custom persona?'))return;let c=load(LS.custom,[]);c=c.filter(p=>p.id!==id);save(LS.custom,c);toast('Removed');renderAdd()}
function exportAll(){
  const data={meta:SEED.meta,personas:getPersonas().map(p=>{const q=Object.assign({},p);delete q._custom;return q})};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='prospect-intelligence-export.json';a.click();
  toast('Exported '+data.personas.length+' personas');
}
function slugify(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}
function doImport(){
  const raw=document.getElementById('addBox').value.trim();
  const msg=document.getElementById('addMsg');
  if(!raw){msg.innerHTML='<div class="feedback bad">Paste a filled template first.</div>';return}
  try{
    const p=parsePersona(raw);
    const custom=load(LS.custom,[]);
    const existing=getPersonas().find(x=>x.id===p.id);
    if(existing && !existing._custom){p.id=p.id+'-custom'}
    const idx=custom.findIndex(x=>x.id===p.id);
    if(idx>=0)custom[idx]=p;else custom.push(p);
    save(LS.custom,custom);
    msg.innerHTML=`<div class="feedback good"><b>Added: ${esc(p.role)}</b>It's live in every mode now. ${(p.quiz.scenarios||[]).length?'':'(Scenarios aren&rsquo;t set via paste — export and send it over to get one authored.)'}</div>`;
    document.getElementById('addBox').value='';
    toast(p.role+' added ✓');
    setTimeout(renderAdd,1400);
  }catch(e){
    msg.innerHTML=`<div class="feedback bad"><b>Couldn't parse that</b>${esc(e.message)}<br><span class="muted">Tip: keep the <code class="k"># SECTION</code> headers and the <code class="k">Q: ... | A: ...</code> format from the template.</span></div>`;
  }
}
function parsePersona(raw){
  const lines=raw.split(/\r?\n/);
  const get=(re)=>{const l=lines.find(x=>re.test(x));return l?l.replace(re,'').trim():''};
  const role=get(/^ROLE:\s*/i);
  if(!role)throw new Error('Missing ROLE: line.');
  let altitude=get(/^ALTITUDE:\s*/i).toLowerCase()||'manager';
  if(!ALT_ORDER.includes(altitude))altitude='manager';
  const icon=get(/^ICON:\s*/i)||'🎯';
  const oneLiner=get(/^ONELINER:\s*/i)||get(/^ONE-LINER:\s*/i);
  // split into sections by "# HEADER"
  const sections={};let cur=null;
  lines.forEach(l=>{
    const m=l.match(/^#\s*([A-Za-z]+)\s*$/);
    if(m){cur=m[1].toUpperCase();sections[cur]=[];}
    else if(cur)sections[cur].push(l);
  });
  const dimKeyMap={CARES:'cares',ROLEIMPACT:'roleImpact',SALESFORCEREALITY:'salesforceReality',COPADOIMPACT:'copadoImpact',COMPETINGPRIORITIES:'competingPriorities',MEETINGTRIGGER:'meetingTrigger',DISCOVERYQUESTIONS:'discoveryQuestions'};
  const dimensions={};
  Object.keys(dimKeyMap).forEach(K=>{
    const body=sections[K]||[];
    const summary=(body.find(x=>/^summary:/i.test(x))||'').replace(/^summary:/i,'').trim();
    const points=body.filter(x=>/^\s*[-*]\s+/.test(x)).map(x=>x.replace(/^\s*[-*]\s+/,'').trim());
    dimensions[dimKeyMap[K]]={summary:summary||'(add a summary)',points:points.length?points:['(add points)']};
  });
  // flashcards
  const flashcards=(sections.FLASHCARDS||[]).filter(x=>/Q:.*A:/i.test(x)).map(x=>{
    const fm=x.match(/Q:\s*(.*?)\s*\|\s*A:\s*(.*?)(?:\s*\|\s*dim:\s*(\w+))?\s*$/i);
    if(!fm)return null;return {front:fm[1].trim(),back:fm[2].trim(),dim:fm[3]?fm[3].trim():'cares'};
  }).filter(Boolean);
  // mcq
  const mcq=[];let block=sections.MCQ||[],mq=null;
  block.forEach(l=>{
    if(/^Q:/i.test(l)){if(mq)mcq.push(finishMcq(mq));mq={q:l.replace(/^Q:/i,'').trim(),choices:[],answer:0,explain:'',dim:'cares'};}
    else if(mq&&/^\*\s+/.test(l)){mq.answer=mq.choices.length;mq.choices.push(l.replace(/^\*\s+/,'').trim());}
    else if(mq&&/^[-]\s+/.test(l)){mq.choices.push(l.replace(/^[-]\s+/,'').trim());}
    else if(mq&&/^explain:/i.test(l)){mq.explain=l.replace(/^explain:/i,'').trim();}
    else if(mq&&/^dim:/i.test(l)){mq.dim=l.replace(/^dim:/i,'').trim();}
  });
  if(mq)mcq.push(finishMcq(mq));
  // objections
  const objections=(sections.OBJECTIONS||[]).filter(x=>/O:.*\|.*R:/i.test(x)).map(x=>{
    const om=x.match(/O:\s*(.*?)\s*\|\s*R:\s*(.*?)\s*$/i);return om?{objection:om[1].trim(),response:om[2].trim(),dim:'meetingTrigger'}:null;
  }).filter(Boolean);
  const quote=((sections.QUOTE||[]).join('\n')).trim().replace(/^"|"$/g,'');
  return {id:slugify(role),role,altitude,icon,oneLiner:oneLiner||role,dimensions,quiz:{flashcards,mcq,scenarios:[],objections,quote}};
}
function finishMcq(mq){if(mq.choices.length<2)mq.choices.push('(add option)');return mq}

renderHome();
</script>
